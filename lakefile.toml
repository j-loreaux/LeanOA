name = "LeanOA"
defaultTargets = ["LeanOA"]
lintDriver = "batteries/runLinter"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false # no "assume a typo is a new variable"
relaxedAutoImplicit = false # no "assume a typo is a new variable"
maxSynthPendingDepth = 3 # same as mathlib, changes behaviour of typeclass inference
weak.linter.flexible = true # no rigid tactic (e.g. `exact`) after a flexible tactic (e.g. `simp`)
# Enable all mathlib linters: automatically matches what mathlib uses.
weak.linter.mathlibStandardSet = false
# Switch off warnings generated by `sorry`
warn.sorry = false
# Switch off the new transparency requirements for defeq until errors are fixed in Mathlib upstream.
backward.isDefEq.respectTransparency = false

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "verso-slides"
git = "https://github.com/leanprover/verso-slides.git"
rev = "main"

[[lean_lib]]
name = "LeanOA.ICERM.Loreaux"
needs = ["@Mathlib/+Mathlib.Analysis.CStarAlgebra.ContinuousFunctionalCalculus.Basic:highlighted"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"

[[lean_lib]]
name = "LeanOA"

[[lean_exe]]
name = "slides"
root = "BuildSlides"

[[lean_exe]]
name = "icerm"
root = "ICERMSlides"
